<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- TOP NAV -->
  <header class="top-nav">
    <div class="logo-area">
        <img src="image-removebg-preview.png" alt="Logo">
    </div>

    <div class="nav-center">
        <h2 class="nav-btn active" onclick="showSection('products')">Products</h2>
        <h2 class="nav-btn" onclick="showSection('reservations')">Reservations</h2>
    </div>

    <button class="logout-btn" onclick="window.location.href='index.html'">
        Logout
    </button>
  </header>

  <!-- PRODUCTS SECTION -->
  <section class="main" id="products-section">
    <h3>All Products</h3>

    <div class="actions">
      <input type="text" id="searchBar" placeholder="Search product...">
      <button id="addProductBtn">Add New Product</button>
    </div>

    <div id="productContainer" class="product-container"></div>
  </section>

  <!-- RESERVATIONS SECTION -->
  <section class="main hidden" id="reservations-section">
    <h3>All Reservations</h3>

    <div class="actions">
      <input type="text" id="searchResBar" placeholder="Search reservation...">
      <button id="addReserveBtn">Add Reservation</button>
    </div>

    <div id="reservationContainer" class="reservation-container"></div>
  </section>

  <!-- PRODUCT POPUP -->
  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <h3>Add New Product</h3>

      <label>Product Name</label>
      <input type="text" id="productName">

      <label>Product Image</label>
      <input type="file" id="productImage" accept="image/*">

      <label>Price</label>
      <input type="number" id="productPrice" min="1">

      <label>Quantity</label>
      <input type="number" id="productQty" min="1">

      <div class="popup-buttons">
        <button id="cancelBtn">Cancel</button>
        <button id="saveBtn">Save Product</button>
      </div>
    </div>
  </div>

  <!-- ADD RESERVATION POPUP -->
  <div id="reservePopup" class="popup hidden">
    <div class="popup-content">
      <h3>Add Reservation</h3>

      <label>Student Name</label>
      <input type="text" id="studentName">

      <label>Student Number</label>
      <input type="text" id="studentNumber">

      <label>Product</label>
      <input type="text" id="reserveProduct">

      <label>Quantity</label>
      <input type="number" id="reserveQty" min="1">

      <label>Price</label>
      <input type="number" id="reservePrice" min="1">

      <div class="popup-buttons">
        <button id="cancelReserveBtn">Cancel</button>
        <button id="saveReserveBtn">Proceed</button>
      </div>
    </div>
  </div>

  <!-- RESERVATION DETAILS POPUP -->
  <div id="resDetailsPopup" class="popup hidden">
    <div class="popup-content">
      <h3><span id="resDetailsName"></span>'s Reservation</h3>

      <label>Status</label>
      <div class="status-buttons">
          <button class="status-btn" onclick="setStatus('Ongoing')">Ongoing</button>
          <button class="status-btn" onclick="setStatus('Paid')">Paid</button>
      </div>

      <button id="closeResDetails" class="close-details-btn">Close</button>
    </div>
  </div>

<script>
let imageData = "";

// SWITCH SECTIONS
function showSection(section) {
  document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.remove("active"));

  if (section === "products") {
    document.querySelector(".nav-btn:nth-child(1)").classList.add("active");
  } else {
    document.querySelector(".nav-btn:nth-child(2)").classList.add("active");
  }

  document.getElementById("products-section").classList.add("hidden");
  document.getElementById("reservations-section").classList.add("hidden");

  document.getElementById(section + "-section").classList.remove("hidden");
}

/* ---------------------------
   PRODUCT POPUP
---------------------------- */

addProductBtn.onclick = () => popup.classList.remove("hidden");
cancelBtn.onclick = () => popup.classList.add("hidden");

productImage.addEventListener("change", function() {
  const reader = new FileReader();
  reader.onload = () => imageData = reader.result;
  reader.readAsDataURL(this.files[0]);
});

saveBtn.onclick = () => {
  const name = productName.value;
  const price = productPrice.value;
  const qty = productQty.value;

  if (!name || !price || !qty || !imageData) {
    alert("Fill all fields.");
    return;
  }

  const card = document.createElement("div");
  card.className = "product-card";

  card.innerHTML = `
    <button class="delete-btn">×</button>
    <img src="${imageData}">
    <h4>${name}</h4>
    <p>Price: ₱${price}</p>
    <p>Qty: ${qty}</p>
  `;

  productContainer.appendChild(card);

  card.querySelector(".delete-btn").onclick = () => card.remove();

  popup.classList.add("hidden");
  productName.value = productPrice.value = productQty.value = "";
  productImage.value = "";
  imageData = "";
};

/* ---------------------------
   ADD RESERVATION POPUP
---------------------------- */

addReserveBtn.onclick = () => reservePopup.classList.remove("hidden");
cancelReserveBtn.onclick = () => reservePopup.classList.add("hidden");

saveReserveBtn.onclick = () => {
  const name = studentName.value;
  const number = studentNumber.value;
  const product = reserveProduct.value;
  const qty = reserveQty.value;
  const price = reservePrice.value;

  if (!name || !number || !product || !qty || !price) {
    alert("Fill all fields.");
    return;
  }

  const row = document.createElement("div");
  row.className = "reservation-card";

  row.innerHTML = `
    <div class="res-info">
      <strong>${name}</strong> • ${number} • ${product} • Qty: ${qty} • ₱${price}
    </div>
    <div class="res-status">Status: None</div>
    <button class="delete-res-btn">×</button>
`;

  reservationContainer.appendChild(row);

  // delete button
  row.querySelector(".delete-res-btn").onclick = (event) => {
    event.stopPropagation();
    row.remove();
  };

  // open details
  row.onclick = () => {
    document.getElementById("resDetailsName").textContent = name;
    resDetailsPopup.classList.remove("hidden");
  };

  reservePopup.classList.add("hidden");

  studentName.value = studentNumber.value = reserveProduct.value =
  reserveQty.value = reservePrice.value = "";
};

/* ---------------------------
   RESERVATION DETAILS POPUP
---------------------------- */

closeResDetails.onclick = () => resDetailsPopup.classList.add("hidden");

function setStatus(status) {
  alert("Status updated to: " + status);
}
</script>

</body>
</html>
