<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>

  <header class="top-nav">
    <div class="logo-area">
      <img src="{{ url_for('static', filename='image-removebg-preview.png') }}" alt="Logo">
    </div>

    <div class="nav-center">
      <h2 id="productsTab" class="nav-btn active" onclick="showSection('products')">Products</h2>
      <h2 id="reservationsTab" class="nav-btn" onclick="showSection('reservations')">Reservations</h2>
    </div>

    <button class="logout-btn">Logout</button>
  </header>

  <section class="main" id="products-section">
    <h3>All Products</h3>

    <div class="actions">
      <input type="text" id="searchBar" placeholder="Search product...">
      <button id="addProductBtn">Add New Product</button>
    </div>

    <div id="productContainer" class="product-container"></div>
  </section>

  <section class="main hidden" id="reservations-section">
    <h3>All Reservations</h3>

    <div class="actions">
      <input type="text" id="searchResBar" placeholder="Search reservation...">
    </div>

    <div id="reservationContainer" class="reservation-container"></div>
  </section>

  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <h3 id="popupTitle">Add New Product</h3>

      <label>Product Name</label>
      <input type="text" id="productName">

      <label>Product Image</label>
      <input type="file" id="productImage" accept="image/*">

      <label>Price</label>
      <input type="number" id="productPrice" min="1">

      <label>Quantity</label>
      <input type="number" id="productQty" min="0">

      <div class="popup-buttons">
        <button id="cancelBtn" type="button">Cancel</button>
        <button id="saveBtn" type="button">Save Product</button>
      </div>
    </div>
  </div>

  <script>
    let imageData = "";
    let editingItemId = null;

    const productContainer = document.getElementById("productContainer");
    const reservationContainer = document.getElementById("reservationContainer");

    const addProductBtn = document.getElementById("addProductBtn");
    const popup = document.getElementById("popup");
    const cancelBtn = document.getElementById("cancelBtn");

    const productImage = document.getElementById("productImage");
    const productName = document.getElementById("productName");
    const productPrice = document.getElementById("productPrice");
    const productQty = document.getElementById("productQty");
    const saveBtn = document.getElementById("saveBtn");
    const popupTitle = document.getElementById("popupTitle");

    const logoutBtn = document.querySelector(".logout-btn");
    const productsTab = document.getElementById("productsTab");
    const reservationsTab = document.getElementById("reservationsTab");

    function logout() {
      localStorage.removeItem("username");
      localStorage.removeItem("email");
      localStorage.removeItem("role");
      window.location.href = "/";
    }

    logoutBtn.onclick = logout;

    function showSection(section) {
      productsTab.classList.remove("active");
      reservationsTab.classList.remove("active");

      if (section === "products") {
        productsTab.classList.add("active");
      } else {
        reservationsTab.classList.add("active");
        loadAllReservations();
      }

      document.getElementById("products-section").classList.add("hidden");
      document.getElementById("reservations-section").classList.add("hidden");
      document.getElementById(section + "-section").classList.remove("hidden");
    }

    function resetPopup() {
      editingItemId = null;
      imageData = "";
      popupTitle.textContent = "Add New Product";
      saveBtn.textContent = "Save Product";
      productName.value = "";
      productPrice.value = "";
      productQty.value = "";
      productImage.value = "";
    }

    addProductBtn.onclick = () => {
      resetPopup();
      popup.classList.remove("hidden");
    };

    cancelBtn.onclick = () => {
      popup.classList.add("hidden");
      resetPopup();
    };

    productImage.addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        imageData = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    saveBtn.onclick = async () => {
      const name = productName.value.trim();
      const price = productPrice.value;
      const qty = productQty.value;

      if (!name || !price || qty === "") {
        alert("Fill all fields.");
        return;
      }

      try {
        let response;

        if (editingItemId === null) {
          if (!imageData) {
            alert("Please choose an image.");
            return;
          }

          response = await fetch("/add_item", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: name,
              price: price,
              qty: qty,
              image: imageData
            })
          });
        } else {
          response = await fetch("/update_item", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              id: editingItemId,
              name: name,
              price: price,
              qty: qty,
              image: imageData
            })
          });
        }

        const data = await response.json();
        alert(data.message);

        if (response.ok) {
          popup.classList.add("hidden");
          resetPopup();
          loadItems();
        }
      } catch (err) {
        console.error("Save error:", err);
        alert("Server error while saving product.");
      }
    };

    async function loadItems() {
      try {
        const response = await fetch("/get_items");
        const data = await response.json();

        productContainer.innerHTML = "";

        if (!data.items || data.items.length === 0) {
          productContainer.innerHTML = "<p>No products available.</p>";
          return;
        }

        data.items.forEach((item) => {
          const card = document.createElement("div");
          card.className = "product-card";

          card.innerHTML = `
            <button class="delete-btn" type="button">×</button>
            <img src="${item.image}" alt="${item.name}">
            <h4>${item.name}</h4>
            <p>Price: ₱${item.price}</p>
            <p>Qty: ${item.qty}</p>
            <button class="edit-btn" type="button">Edit</button>
          `;

          const deleteBtn = card.querySelector(".delete-btn");
          const editBtn = card.querySelector(".edit-btn");

          deleteBtn.onclick = async (event) => {
            event.stopPropagation();

            try {
              const res = await fetch(`/delete_item/${item.id}`, {
                method: "DELETE"
              });

              const result = await res.json();
              alert(result.message);
              loadItems();
            } catch (err) {
              console.error("Failed to delete item:", err);
              alert("Error deleting item.");
            }
          };

          editBtn.onclick = () => {
            editingItemId = item.id;
            imageData = item.image; // keep old image if no new one is chosen
            popupTitle.textContent = "Edit Product";
            saveBtn.textContent = "Update Product";

            productName.value = item.name;
            productPrice.value = item.price;
            productQty.value = item.qty;
            productImage.value = "";

            popup.classList.remove("hidden");
          };

          productContainer.appendChild(card);
        });
      } catch (err) {
        console.error("Failed to load items:", err);
        productContainer.innerHTML = "<p>Error loading products.</p>";
      }
    }

    async function loadAllReservations() {
      try {
        const response = await fetch("/get_all_reservations");
        const data = await response.json();

        reservationContainer.innerHTML = "";

        if (!data.reservations || data.reservations.length === 0) {
          reservationContainer.innerHTML = "<p>No reservations found.</p>";
          return;
        }

        data.reservations.forEach((reservation) => {
          const card = document.createElement("div");
          card.className = "reservation-card";

          card.innerHTML = `
            <div class="res-info">
              <strong>${reservation.username}</strong><br>
              Email: ${reservation.email}<br>
              Product: ${reservation.item_name}<br>
              Qty: ${reservation.qty}<br>
              Pickup Date: ${reservation.pickup_date}
            </div>

            <div class="res-status">
              Status:
              <select data-id="${reservation.id}">
                <option value="pending" ${reservation.status === "pending" ? "selected" : ""}>pending</option>
                <option value="done" ${reservation.status === "done" ? "selected" : ""}>done</option>
              </select>
            </div>
          `;

          const select = card.querySelector("select");
          select.addEventListener("change", function () {
            updateReservationStatus(this.dataset.id, this.value);
          });

          reservationContainer.appendChild(card);
        });
      } catch (err) {
        console.error("Failed to load all reservations:", err);
        reservationContainer.innerHTML = "<p>Error loading reservations.</p>";
      }
    }

    async function updateReservationStatus(id, status) {
      try {
        const response = await fetch(`/update_reservation/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status: status })
        });

        const data = await response.json();
        alert(data.message);
        loadAllReservations();
      } catch (err) {
        console.error("Failed to update reservation:", err);
        alert("Error updating reservation.");
      }
    }

    loadItems();
  </script>

</body>
</html>
