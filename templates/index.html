<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="auth-wrapper">

        <!-- LEFT: Login -->
        <div class="login-box">
            <img src="{{ url_for('static', filename='image-removebg-preview.png') }}" alt="Company Logo" class="login-logo">

            <form onsubmit="return false;">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="button" onclick="handleLogin()">Login</button>
            </form>
        </div>

        <div class="divider"></div>

        <!-- RIGHT: Register -->
        <div class="register-box">
            <h3>Create Account</h3>
            <p class="subtitle">Sign up to get started</p>

            <input type="text" id="regUsername" placeholder="Username">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Password">

            <button type="button" onclick="registerUser()">Sign Up</button>
        </div>

    </div>

<script>
async function handleLogin() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value;

    try {
        const response = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                username: user,
                password: pass
            })
        });

        const data = await response.json();
        console.log("LOGIN RESPONSE:", data);

        if (response.ok && data.role && data.username) {
            localStorage.setItem("username", data.username);
            localStorage.setItem("email", data.email || "");
            localStorage.setItem("role", data.role);

            console.log("Saved username:", localStorage.getItem("username"));

            if (data.role === "admin") {
                window.location.href = "/admin";
            } else if (data.role === "student" || data.role === "user") {
                window.location.href = "/user";
            } else {
                alert("Unknown role.");
            }
        } else {
            alert(data.message || "Wrong credentials!");
        }
    } catch (err) {
        console.error("Login error:", err);
        alert("Login failed.");
    }
}

async function registerUser() {
    const username = document.getElementById("regUsername").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;

    try {
        const response = await fetch("/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                email: email,
                password: password
            })
        });

        const data = await response.json();
        alert(data.message);
    } catch (err) {
        console.error("Register error:", err);
        alert("Registration failed.");
    }
}
</script>

</body>
</html>
