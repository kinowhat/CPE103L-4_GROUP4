<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- TOP NAV -->
  <header class="top-nav">
    <div class="logo-area">
        <img src="image-removebg-preview.png" alt="Logo">
    </div>

    <div class="nav-center">
        <h2 class="nav-btn active" onclick="showSection('products')">Products</h2>
        <h2 class="nav-btn" onclick="showSection('reservations')">Reservations</h2>
    </div>

    <button class="logout-btn" onclick="window.location.href='index.html'">
        Logout
    </button>
  </header>

  <!-- PRODUCTS SECTION -->
  <section class="main" id="products-section">
    <h3>All Products</h3>

    <!-- No Add Button -->
    <div class="actions">
      <input type="text" id="searchBar" placeholder="Search product...">
    </div>

    <div id="productContainer" class="product-container"></div>
  </section>

  <!-- RESERVATIONS SECTION -->
  <section class="main hidden" id="reservations-section">
    <h3>All Reservations</h3>

    <!-- No Add Button -->
    <div class="actions">
      <input type="text" id="searchResBar" placeholder="Search reservation...">
    </div>

    <div id="reservationContainer" class="reservation-container"></div>
  </section>

<script>
/* Load shared data from localStorage */
let allProducts = JSON.parse(localStorage.getItem("products") || "[]");
let allReservations = JSON.parse(localStorage.getItem("reservations") || "[]");

/* -------------------------
   SWITCH SECTIONS
--------------------------- */
function showSection(section) {
  document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.remove("active"));

  if (section === "products") {
    document.querySelector(".nav-btn:nth-child(1)").classList.add("active");
  } else {
    document.querySelector(".nav-btn:nth-child(2)").classList.add("active");
  }

  document.getElementById("products-section").classList.add("hidden");
  document.getElementById("reservations-section").classList.add("hidden");

  document.getElementById(section + "-section").classList.remove("hidden");
}

/* -------------------------
   DISPLAY PRODUCTS
--------------------------- */
async function loadItems() {
  const response = await fetch('/get_items');
  const data = await response.json();

  productContainer.innerHTML = "";

  data.items.forEach(item => {
    const card = document.createElement("div");
    card.className = "product-card";
    card.innerHTML = `
      <img src="${item.image}">
      <h4>${item.name}</h4>
      <p>Price: ₱${item.price}</p>
      <p>Qty: ${item.qty}</p>
    `;

    productContainer.appendChild(card);
  });
}

/* -------------------------
   DISPLAY RESERVATIONS
--------------------------- */
function loadReservations() {
  reservationContainer.innerHTML = "";

  allReservations.forEach(r => {
    const row = document.createElement("div");
    row.className = "reservation-card view-only";

    row.innerHTML = `
      <div class="res-info">
        <strong>${r.name}</strong> • ${r.number} • ${r.product} • Qty: ${r.qty} • ₱${r.price}
      </div>
      <div class="res-status">Status: ${r.status}</div>
    `;

    reservationContainer.appendChild(row);
  });
}

/* -------------------------
   INITIAL LOAD
--------------------------- */
loadItems();
loadReservations();
</script>

</body>
</html>
