<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
  <header class="top-nav">
    <div class="logo-area">
        <img src="{{ url_for('static', filename='image-removebg-preview.png') }}" alt="Logo">
    </div>
    <div class="nav-center">
        <h2 class="nav-btn active" onclick="showSection('products')">Products</h2>
        <h2 class="nav-btn" onclick="showSection('reservations')">Reservations</h2>
    </div>
    <button class="logout-btn" onclick="window.location.href='/'">Logout</button>
  </header>

  <!-- PRODUCTS SECTION -->
  <section class="main" id="products-section">
    <h3>All Products</h3>
    <div class="actions">
      <input type="text" id="searchBar" placeholder="Search product...">
    </div>
    <div id="productContainer" class="product-container"></div>
  </section>

  <!-- RESERVATIONS SECTION -->
  <section class="main hidden" id="reservations-section">
    <h3>My Reservations</h3>
    <div class="actions">
      <input type="text" id="searchResBar" placeholder="Search reservation...">
      <button id="addReserveBtn">Add Reservation</button>
    </div>
    <div id="reservationContainer" class="reservation-container"></div>
  </section>

  <!-- ADD RESERVATION POPUP -->
  <div id="reservePopup" class="popup hidden">
    <div class="popup-content">
      <h3>Add Reservation</h3>

      <label>Product</label>
      <select id="reserveProduct"></select>

      <label>Quantity</label>
      <input type="number" id="reserveQty" min="1">

      <label>Pickup Date</label>
      <input type="date" id="reserveDate">

      <div class="popup-buttons">
        <button id="cancelReserveBtn">Cancel</button>
        <button id="saveReserveBtn">Proceed</button>
      </div>
    </div>
  </div>

<script>
  const productContainer = document.getElementById("productContainer");
  const reservationContainer = document.getElementById("reservationContainer");
  const reservePopup = document.getElementById("reservePopup");

  // Hardcoded for now — replace with session/login system later
  const currentUsername = "user";

  /* -------------------------
     SWITCH SECTIONS
  --------------------------- */
  function showSection(section) {
    document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.remove("active"));

    if (section === "products") {
      document.querySelector(".nav-btn:nth-child(1)").classList.add("active");
    } else {
      document.querySelector(".nav-btn:nth-child(2)").classList.add("active");
      loadReservations(); // refresh when switching to reservations tab
    }

    document.getElementById("products-section").classList.add("hidden");
    document.getElementById("reservations-section").classList.add("hidden");
    document.getElementById(section + "-section").classList.remove("hidden");
  }

  /* -------------------------
     DISPLAY PRODUCTS
  --------------------------- */
  async function loadItems() {
    try {
      const response = await fetch('/get_items');
      const data = await response.json();

      productContainer.innerHTML = "";
      const select = document.getElementById("reserveProduct");
      select.innerHTML = "";

      if (data.items.length === 0) {
        productContainer.innerHTML = "<p>No products available.</p>";
        return;
      }

      data.items.forEach(item => {
        // Build product card
        const card = document.createElement("div");
        card.className = item.low_stock ? "product-card low-stock-card" : "product-card";
        card.innerHTML = `
          <img src="${item.image}" alt="${item.name}">
          <h4>${item.name}</h4>
          <p>Price: ₱${item.price}</p>
          <p>Qty: ${item.qty}</p>
          ${item.low_stock ? '<p class="low-stock-label">⚠ Low Stock</p>' : ''}
        `;
        productContainer.appendChild(card);

        // Populate product dropdown in reservation popup
        const option = document.createElement("option");
        option.value = item.id;
        option.textContent = `${item.name} (₱${item.price})`;
        select.appendChild(option);
      });

    } catch (err) {
      console.error("Failed to load items:", err);
      productContainer.innerHTML = "<p>Error loading products. Please try again.</p>";
    }
  }

  /* -------------------------
     DISPLAY RESERVATIONS
  --------------------------- */
  async function loadReservations() {
    try {
      const response = await fetch(`/get_reservations/${currentUsername}`);
      const data = await response.json();

      reservationContainer.innerHTML = "";

      if (data.reservations.length === 0) {
        reservationContainer.innerHTML = "<p>No reservations yet.</p>";
        return;
      }

      data.reservations.forEach(r => {
        const row = document.createElement("div");
        row.className = "reservation-card view-only";
        row.innerHTML = `
          <div class="res-info">
            <strong>${r.item_name}</strong> • Qty: ${r.qty} • Pickup: ${r.pickup_date}
          </div>
          <div class="res-status">Status: ${r.status}</div>
        `;
        reservationContainer.appendChild(row);
      });

    } catch (err) {
      console.error("Failed to load reservations:", err);
      reservationContainer.innerHTML = "<p>Error loading reservations.</p>";
    }
  }

  /* -------------------------
     RESERVATION POPUP
  --------------------------- */
  document.getElementById("addReserveBtn").onclick = () => {
    reservePopup.classList.remove("hidden");
  };

  document.getElementById("cancelReserveBtn").onclick = () => {
    reservePopup.classList.add("hidden");
  };

 where
  /* -------------------------
     INITIAL LOAD
  --------------------------- */
  loadItems();
  loadReservations();
</script>
</body>
</html>
