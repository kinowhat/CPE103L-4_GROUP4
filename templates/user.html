<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
  <header class="top-nav">
    <div class="logo-area">
      <img src="{{ url_for('static', filename='image-removebg-preview.png') }}" alt="Logo">
    </div>

    <div class="nav-center">
      <h2 id="productsTab" class="nav-btn active" onclick="showSection('products')">Products</h2>
      <h2 id="reservationsTab" class="nav-btn" onclick="showSection('reservations')">Reservations</h2>
    </div>

    <button class="logout-btn" type="button">Logout</button>
  </header>

  <section class="main" id="products-section">
    <h3>All Products</h3>
    <div class="actions">
      <input type="text" id="searchBar" placeholder="Search product...">
    </div>
    <div id="productContainer" class="product-container"></div>
  </section>

  <section class="main hidden" id="reservations-section">
    <h3>My Reservations</h3>
    <div class="actions">
      <input type="text" id="searchResBar" placeholder="Search reservation...">
      <button id="addReserveBtn" type="button">Add Reservation</button>
    </div>
    <div id="reservationContainer" class="reservation-container"></div>
  </section>

  <div id="reservePopup" class="popup hidden">
    <div class="popup-content">
      <h3>Add Reservation</h3>

      <label>Product</label>
      <select id="reserveProduct"></select>

      <label>Quantity</label>
      <input type="number" id="reserveQty" min="1">

      <label>Pickup Date</label>
      <input type="date" id="reserveDate">

      <div class="popup-buttons">
        <button id="cancelReserveBtn" type="button">Cancel</button>
        <button id="saveReserveBtn" type="button">Proceed</button>
      </div>
    </div>
  </div>

  <script>
    const productContainer = document.getElementById("productContainer");
    const reservationContainer = document.getElementById("reservationContainer");
    const reservePopup = document.getElementById("reservePopup");

    const productsTab = document.getElementById("productsTab");
    const reservationsTab = document.getElementById("reservationsTab");

    const addReserveBtn = document.getElementById("addReserveBtn");
    const cancelReserveBtn = document.getElementById("cancelReserveBtn");
    const saveReserveBtn = document.getElementById("saveReserveBtn");

    const reserveProduct = document.getElementById("reserveProduct");
    const reserveQty = document.getElementById("reserveQty");
    const reserveDate = document.getElementById("reserveDate");

    const currentUsername = localStorage.getItem("username");
    console.log("USER PAGE currentUsername:", currentUsername);

    if (!currentUsername) {
      alert("Please log in first.");
      window.location.href = "/";
    }

    function logout() {
      localStorage.removeItem("username");
      localStorage.removeItem("email");
      localStorage.removeItem("role");
      window.location.href = "/";
    }

    document.querySelector(".logout-btn").onclick = logout;

    function showSection(section) {
      productsTab.classList.remove("active");
      reservationsTab.classList.remove("active");

      if (section === "products") {
        productsTab.classList.add("active");
      } else {
        reservationsTab.classList.add("active");
        loadReservations();
      }

      document.getElementById("products-section").classList.add("hidden");
      document.getElementById("reservations-section").classList.add("hidden");
      document.getElementById(section + "-section").classList.remove("hidden");
    }

    async function loadItems() {
      try {
        const response = await fetch("/get_items");
        const data = await response.json();

        productContainer.innerHTML = "";
        reserveProduct.innerHTML = "";

        if (!data.items || data.items.length === 0) {
          productContainer.innerHTML = "<p>No products available.</p>";
          return;
        }

        data.items.forEach((item) => {
          const card = document.createElement("div");
          card.className = "product-card";

          card.innerHTML = `
            <img src="${item.image}" alt="${item.name}">
            <h4>${item.name}</h4>
            <p>Price: ₱${item.price}</p>
            <p>Qty: ${item.qty}</p>
          `;

          productContainer.appendChild(card);

          if (item.qty > 0) {
            const option = document.createElement("option");
            option.value = item.id;
            option.textContent = `${item.name} (₱${item.price})`;
            reserveProduct.appendChild(option);
          }
        });

        if (reserveProduct.options.length === 0) {
          const option = document.createElement("option");
          option.textContent = "No items in stock";
          option.disabled = true;
          option.selected = true;
          reserveProduct.appendChild(option);
        }
      } catch (err) {
        console.error("Failed to load items:", err);
        productContainer.innerHTML = "<p>Error loading products.</p>";
      }
    }

    async function loadReservations() {
      try {
        const response = await fetch(`/get_reservations/${currentUsername}`);
        const data = await response.json();

        reservationContainer.innerHTML = "";

        if (!data.reservations || data.reservations.length === 0) {
          reservationContainer.innerHTML = "<p>No reservations yet.</p>";
          return;
        }

        data.reservations.forEach((r) => {
          const row = document.createElement("div");
          row.className = "reservation-card";

          row.innerHTML = `
            <div class="res-info">
              <strong>${r.item_name}</strong><br>
              Qty: ${r.qty}<br>
              Pickup: ${r.pickup_date}
            </div>
            <div class="res-status">
              Status: ${r.status}
            </div>
          `;

          reservationContainer.appendChild(row);
        });
      } catch (err) {
        console.error("Failed to load reservations:", err);
        reservationContainer.innerHTML = "<p>Error loading reservations.</p>";
      }
    }

    addReserveBtn.onclick = () => {
      reservePopup.classList.remove("hidden");
    };

    cancelReserveBtn.onclick = () => {
      reservePopup.classList.add("hidden");
    };

    saveReserveBtn.onclick = async () => {
      const item_id = reserveProduct.value;
      const qty = reserveQty.value;
      const pickup_date = reserveDate.value;

      if (!currentUsername) {
        alert("No logged-in user found.");
        return;
      }

      if (!item_id || !qty || !pickup_date) {
        alert("Fill all fields.");
        return;
      }

      try {
        const response = await fetch("/add_reservation", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: currentUsername,
            item_id: item_id,
            qty: qty,
            pickup_date: pickup_date
          })
        });

        const data = await response.json();
        console.log("ADD RESERVATION RESPONSE:", data);
        alert(data.message);

        if (response.ok) {
          reservePopup.classList.add("hidden");
          reserveQty.value = "";
          reserveDate.value = "";
          loadItems();
          loadReservations();
        }
      } catch (err) {
        console.error("Failed to add reservation:", err);
        alert("Failed to add reservation.");
      }
    };

    loadItems();
    loadReservations();
  </script>
</body>
</html>
